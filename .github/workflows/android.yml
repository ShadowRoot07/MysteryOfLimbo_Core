name: Android Build (Mystery of Limbo)

on:
  push:
    branches: [ ShadowRoot-CreateAPK ]
  pull_request:
    branches: [ ShadowRoot-CreateAPK ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Entorno
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar NDK y Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Compilar C++ a Binario Android
        run: |
          mkdir build_android
          cd build_android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja
          ninja main

      - name: Generar APK Real
        run: |
          mkdir -p bin/lib/arm64-v8a
          # Copiamos el binario real compilado
          find build_android -name "libmain.so" -exec cp {} bin/lib/arm64-v8a/ \;
          
          # Creamos un archivo zip que Android reconozca como APK
          # Incluimos el manifiesto y el binario
          cd bin && zip -r MysteryOfLimbo_Debug.apk lib/ ../android/app/src/main/AndroidManifest.xml
          
          echo "Build exitoso: $(ls -lh MysteryOfLimbo_Debug.apk)" > build_info.txt

      - name: Commit y Push del APK al Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "ShadowRoot07 (via GitHub Actions)"
          git config --global user.email "shadowroot07@users.noreply.github.com"
          git add bin/
          git commit -m "chore: build android binary [skip ci]" || echo "No hay cambios para subir"
          # Usamos el token directamente en la URL para evitar el error 403
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ShadowRoot-CreateAPK

