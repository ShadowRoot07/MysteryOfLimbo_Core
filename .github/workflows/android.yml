name: Android Build & Sync

on:
  push:
    branches: [ ShadowRoot-CreateAPK ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso para que el bot haga commit del APK
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Entorno
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar NDK y Dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-mixer-dev
          # Aquí es donde el script de SDL2 suele generar el proyecto.
          # Para este paso rápido, crearemos un placeholder que valide el binario.

      - name: Compilar C++ a Binario Android
        run: |
          mkdir build_android
          cd build_android
          cmake .. -DCMAKE_SYSTEM_NAME=Android -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a
          make

      - name: Generar APK (Simulado para Sync)
        run: |
          mkdir -p bin
          # En un proyecto real aquí corre ./gradlew assembleDebug
          # Por ahora, moveremos el binario para que lo tengas disponible
          cp build_android/libmain.so bin/limbo_android_engine.so
          touch bin/MysteryOfLimbo.apk 

      - name: Commit y Push del APK al Repo
        run: |
          git config --global user.name "ShadowBot"
          git config --global user.email "bot@github.com"
          git add bin/*.so bin/*.apk
          git commit -m "chore: update android binaries [skip ci]" || echo "No changes"
          git push

