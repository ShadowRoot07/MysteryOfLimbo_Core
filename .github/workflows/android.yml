name: Android Build (Mystery of Limbo)

on:
  push:
    branches: [ ShadowRoot-CreateAPK ]
  pull_request:
    branches: [ ShadowRoot-CreateAPK ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Entorno
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar NDK y Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Compilar C++ a Binario Android
        run: |
          mkdir build_android
          cd build_android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja
          ninja main

      - name: Generar APK Real
        run: |
          # Limpiamos cualquier residuo anterior
          rm -f bin/MysteryOfLimbo_Debug.apk
          mkdir -p proto_apk/lib/arm64-v8a
          
          # 1. Copiamos el binario real compilado (.so) a la ruta interna de Android
          find build_android -name "libmain.so" -exec cp {} proto_apk/lib/arm64-v8a/ \;

          # 2. Copiamos el Manifiesto a la raíz del proto_apk
          cp android/app/src/main/AndroidManifest.xml proto_apk/

          # 3. Creamos el APK desde la carpeta proto_apk
          cd proto_apk && zip -r ../bin/MysteryOfLimbo_Debug.apk .
          
          # 4. Info de debug
          cd ..
          echo "Build exitoso: $(ls -lh bin/MysteryOfLimbo_Debug.apk)" > bin/build_info.txt

      - name: Commit y Push del APK al Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "ShadowRoot07 (via GitHub Actions)"
          git config --global user.email "shadowroot07@users.noreply.github.com"
          git add bin/
          git commit -m "chore: build android binary [skip ci]" || echo "No hay cambios para subir"
          # Usamos el token directamente en la URL para evitar el error 403
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ShadowRoot-CreateAPK

