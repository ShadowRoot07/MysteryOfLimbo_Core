name: Android Build (Mystery of Limbo)

on:
  push:
    branches: [ ShadowRoot-CreateAPK ]
  pull_request:
    branches: [ ShadowRoot-CreateAPK ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Entorno
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar NDK y Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Compilar C++ a Binario Android
        run: |
          mkdir build_android
          cd build_android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -GNinja
          ninja main

      - name: Generar APK con AAPT2
        run: |
          # 1. Definir rutas de herramientas de Android
          export TOOL_PATH=$ANDROID_HOME/build-tools/34.0.0
          
          # 2. Compilar el Manifiesto (Transforma texto a binario Android)
          $TOOL_PATH/aapt2 link -o proto.apk \
            --manifest android/app/src/main/AndroidManifest.xml \
            -I $ANDROID_HOME/platforms/android-34/android.jar
          
          # 3. Crear estructura de librerías y meter el .so
          mkdir -p lib/arm64-v8a
          find build_android -name "libmain.so" -exec cp {} lib/arm64-v8a/ \;
          
          # 4. Meter la librería dentro del APK compilado usando zip (sin comprimir el .so)
          zip -0 -r proto.apk lib/
          
          # 5. Mover al destino final
          mkdir -p bin
          mv proto.apk bin/MysteryOfLimbo_Debug.apk

      - name: Commit y Push del APK al Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "ShadowRoot07 (via GitHub Actions)"
          git config --global user.email "shadowroot07@users.noreply.github.com"
          git add bin/
          git commit -m "chore: build android binary [skip ci]" || echo "No hay cambios para subir"
          # Usamos el token directamente en la URL para evitar el error 403
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ShadowRoot-CreateAPK

