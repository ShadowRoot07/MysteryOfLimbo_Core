name: Android Build (Mystery of Limbo)

on:
  push:
    branches: [ ShadowRoot-CreateAPK ]
  pull_request:
    branches: [ ShadowRoot-CreateAPK ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Entorno
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instalar NDK y Herramientas
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Compilar C++ a Binario Android
        run: |
          mkdir -p build_android
          cd build_android
          # Compilamos para ambas arquitecturas para asegurar compatibilidad
          for ABI in armeabi-v7a arm64-v8a; do
            mkdir -p $ABI
            cd $ABI
            cmake ../.. \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$ABI \
              -DANDROID_PLATFORM=android-26 \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=ON \
              -GNinja
            ninja
            cd ..
          done

      - name: Generar APK Profesional con AAPT2 y Java
        run: |
          export TOOL_PATH=$ANDROID_HOME/build-tools/34.0.0
          export PLATFORM=$ANDROID_HOME/platforms/android-34/android.jar

          # 1. Preparar Java (SDL2)
          git clone --depth 1 https://github.com/libsdl-org/SDL.git sdl_java_lib
          cp -r sdl_java_lib/android-project/app/src/main/java/org/libsdl/app android/app/src/main/java/

          # 2. Compilar Java a DEX
          mkdir -p bin/java_compiled
          javac -d bin/java_compiled -sourcepath android/app/src/main/java -cp $PLATFORM $(find android/app/src/main/java -name "*.java")
          $TOOL_PATH/d8 --output bin/ $(find bin/java_compiled -name "*.class") --lib $PLATFORM
          # El archivo debe llamarse classes.dex y estar en la raíz de bin/

          # 3. Vincular con AAPT2 (Añadimos carpeta assets vacía para evitar errores de SDL)
          mkdir -p assets
          $TOOL_PATH/aapt2 link -o base.apk \
            --manifest android/app/src/main/AndroidManifest.xml \
            -I $PLATFORM \
            -A assets/ \
            --version-code 1 --version-name "1.0"

          # 4. Inyectar contenido al APK
          # Inyectar clases
          zip -j base.apk bin/classes.dex

          # Inyectar Librerías (Estructura interna crítica)
          rm -rf lib/
          mkdir -p lib/armeabi-v7a lib/arm64-v8a
          
          # Copiamos lo que compilamos en el paso anterior de Ninja
          find build_android/armeabi-v7a -name "*.so" -exec cp {} lib/armeabi-v7a/ \;
          find build_android/arm64-v8a -name "*.so" -exec cp {} lib/arm64-v8a/ \;

          # Forzar inclusión de la carpeta lib completa
          zip -r base.apk lib/

          # 5. Alineación
          mkdir -p bin_final
          $TOOL_PATH/zipalign -f -p 4 base.apk bin/MysteryOfLimbo_Debug.apk

      - name: Commit y Push del APK al Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "ShadowRoot07 (via GitHub Actions)"
          git config --global user.email "shadowroot07@users.noreply.github.com"
          git add bin/
          git commit -m "chore: build android binary [skip ci]" || echo "No hay cambios para subir"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ShadowRoot-CreateAPK

